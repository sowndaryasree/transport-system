<!DOCTYPE html>
<html>

<head>

<title>Dashboard</title>

<link rel="stylesheet" href="style.css">

<script>
if(localStorage.getItem("loggedIn") !== "true"){
window.location.href = "login.html"
}
</script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="sidebar">

<h2>Transport</h2>

<a href="dashboard.html">Dashboard</a>
<a href="vehicles.html">Vehicles</a>
<a href="drivers.html">Drivers</a>
<a href="trips.html">Trips</a>
<a href="fuel.html">Fuel</a>
<a href="maintenance.html">Maintenance</a>
<a href="salary.html">Salary</a>
<a href="attendance.html">Attendance</a>

<button onclick="logout()" class="logout-btn">Logout</button>

</div>


<div class="main">

<h1>Dashboard</h1>


<div class="cards">

<div class="card">
<h3>Total Trips</h3>
<p id="total_trips">0</p>
</div>

<div class="card">
<h3>Total Income</h3>
<p id="total_income">0</p>
</div>

<div class="card">
<h3>Fuel Expense</h3>
<p id="fuel_expense">0</p>
</div>

<div class="card">
<h3>Maintenance</h3>
<p id="maintenance_expense">0</p>
</div>

<div class="card">
<h3>Driver Salary</h3>
<p id="salary_expense">0</p>
</div>

<div class="card">
<h3>Profit</h3>
<p id="profit">0</p>
</div>

</div>

<hr>

<h2>Monthly Income</h2>
<canvas id="monthlyChart"></canvas>

<hr>

<h2>Vehicle Profit</h2>
<canvas id="vehicleChart"></canvas>
<br><br>

<button onclick="exportReport()">Download Full Report</button>

</div>


<script>

const API = "https://transport-system-1-i84e.onrender.com"

let monthlyChart
let vehicleChart


function formatMoney(num){
num = Number(num) || 0
return "₹" + num.toLocaleString("en-IN")
}


function loadDashboard(){

Promise.all([
fetch(API+"/get_trips").then(r=>r.json()),
fetch(API+"/get_fuel").then(r=>r.json()),
fetch(API+"/get_maintenance").then(r=>r.json()),
fetch(API+"/get_salary").then(r=>r.json())
])

.then(([trips,fuel,maintenance,salary])=>{

let totalTrips = trips.length

let income = 0
trips.forEach(t=> income += Number(t.customer_payment) || 0)

let fuelCost = 0
fuel.forEach(f=> fuelCost += Number(f.total_cost) || 0)

let maintenanceCost = 0
maintenance.forEach(m=> maintenanceCost += Number(m.cost) || 0)

let salaryCost = 0
salary.forEach(s=> salaryCost += Number(s.amount) || 0)

let profit = income - fuelCost - maintenanceCost - salaryCost

document.getElementById("total_trips").innerText = totalTrips
document.getElementById("total_income").innerText = formatMoney(income)
document.getElementById("fuel_expense").innerText = formatMoney(fuelCost)
document.getElementById("maintenance_expense").innerText = formatMoney(maintenanceCost)
document.getElementById("salary_expense").innerText = formatMoney(salaryCost)
document.getElementById("profit").innerText = formatMoney(profit)

})

.catch(()=>{
console.log("Dashboard load failed")
})

}



function loadMonthlyChart(){

fetch(API+"/monthly_report")
.then(r=>r.json())
.then(data=>{

let labels = Object.keys(data || {})
let values = Object.values(data || {})

if(monthlyChart) monthlyChart.destroy()

monthlyChart = new Chart(document.getElementById("monthlyChart"),{

type:"bar",

data:{
labels:labels,
datasets:[{
label:"Monthly Income",
data:values
}]
}

})

})

}



function loadVehicleChart(){

fetch(API+"/vehicle_report")
.then(r=>r.json())
.then(data=>{

let labels = Object.keys(data || {})
let values = Object.values(data || {})

if(vehicleChart) vehicleChart.destroy()

vehicleChart = new Chart(document.getElementById("vehicleChart"),{

type:"pie",

data:{
labels:labels,
datasets:[{
label:"Vehicle Profit",
data:values
}]
}

})

})

}


function downloadReport(){
window.open(API+"/export_full_report")
}


loadDashboard()
loadMonthlyChart()
loadVehicleChart()


function logout(){

localStorage.removeItem("loggedIn")
window.location.href = "login.html"

}

</script>

</body>
</html>
