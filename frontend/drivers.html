<!DOCTYPE html>
<html>

<head>
<title>Drivers</title>
<link rel="stylesheet" href="/frontend/style.css">

<script>
if(localStorage.getItem("loggedIn") !== "true"){
window.location.href = "/frontend/login.html"
}
</script>
</head>

<body>

<div class="sidebar">

<h2>Transport</h2>

<a href="/frontend/dashboard.html">Dashboard</a>
<a href="/frontend/vehicles.html">Vehicles</a>
<a href="/frontend/drivers.html">Drivers</a>
<a href="/frontend/trips.html">Trips</a>
<a href="/frontend/fuel.html">Fuel</a>
<a href="/frontend/maintenance.html">Maintenance</a>
<a href="/frontend/salary.html">Salary</a>
<a href="/frontend/attendance.html">Attendance</a>
<button onclick="logout()" class ="logout-btn">Logout</button>

</div>


<div class="main">

<h1>Add Driver</h1>

<input id="driver_name" placeholder="Driver Name">

<br><br>

<input id="driver_phone" placeholder="Phone Number">

<br><br>

<input id="license_number" placeholder="License Number (Optional)">

<br><br>

<button onclick="addDriver()">Add Driver</button>

<hr>

<h2>Driver List</h2>

<table id="driver_table" border="1">

<tr>
<th>Name</th>
<th>Phone</th>
<th>License</th>
<th>Delete</th>
</tr>

</table>

</div>



<script>

const API = "https://transport-system-seven.vercel.app/api"



function addDriver(){

let name = document.getElementById("driver_name").value
let phone = document.getElementById("driver_phone").value
let license = document.getElementById("license_number").value

fetch(API + "/add_driver?name="+name+
"&phone="+phone+
"&license_number="+license,{
method:"POST"
})
.then(()=>{

alert("Driver Added")

loadDrivers()

})

}



function loadDrivers(){

fetch(API + "/get_drivers")
.then(r=>r.json())
.then(data=>{

let table = document.getElementById("driver_table")

table.innerHTML = `
<tr>
<th>Name</th>
<th>Phone</th>
<th>License</th>
<th>Delete</th>
</tr>
`

data.forEach(d=>{

table.innerHTML += `
<tr>
<td>${d.name}</td>
<td>${d.phone}</td>
<td>${d.license_number}</td>
<td>
<button onclick="deleteDriver(${d.id})">Delete</button>
</td>
</tr>
`

})

})

}



function deleteDriver(id){

fetch(API + "/delete_driver/"+id,{
method:"DELETE"
})
.then(()=>{

loadDrivers()

})

}



loadDrivers()

<script>

function logout(){

localStorage.removeItem("loggedIn")

window.location.href = "/frontend/login.html"

}

</script>
</script>

</body>
</html>
