<!DOCTYPE html>
<html>

<head>

<title>Drivers</title>

<link rel="stylesheet" href="style.css">

<script>
if(localStorage.getItem("loggedIn") !== "true"){
window.location.href = "login.html"
}
</script>

</head>

<body>

<div class="sidebar">

<h2>Transport</h2>

<a href="dashboard.html">Dashboard</a>
<a href="vehicles.html">Vehicles</a>
<a href="drivers.html">Drivers</a>
<a href="trips.html">Trips</a>
<a href="fuel.html">Fuel</a>
<a href="maintenance.html">Maintenance</a>
<a href="salary.html">Salary</a>
<a href="attendance.html">Attendance</a>

<button onclick="logout()" class="logout-btn">Logout</button>

</div>


<div class="main">

<h1>Add Driver</h1>

<input id="driver_name" placeholder="Driver Name">

<br><br>

<input id="driver_phone" placeholder="Phone Number">

<br><br>

<input id="license_number" placeholder="License Number (Optional)">

<br><br>

<button onclick="addDriver()">Add Driver</button>
<button onclick="updateDriver()">Update Driver</button>

<hr>

<h2>Driver List</h2>

<table id="driver_table" border="1">

<tr>
<th>Name</th>
<th>Phone</th>
<th>License</th>
<th>Edit</th>
<th>Delete</th>
</tr>

</table>

</div>


<script>

const API = "https://transport-system-1-i84e.onrender.com"

let currentDriver = null



function addDriver(){

let name = document.getElementById("driver_name").value
let phone = document.getElementById("driver_phone").value
let license = document.getElementById("license_number").value

if(name === "" || phone === ""){
alert("Please fill driver name and phone")
return
}

fetch(API + "/add_driver?name="+name+
"&phone="+phone+
"&license_number="+license,{
method:"POST"
})

.then(()=>{

alert("Driver Added")

document.getElementById("driver_name").value=""
document.getElementById("driver_phone").value=""
document.getElementById("license_number").value=""

loadDrivers()

})

}



function loadDrivers(){

fetch(API + "/get_drivers")
.then(r=>r.json())
.then(data=>{

let table = document.getElementById("driver_table")

table.innerHTML=`
<tr>
<th>Name</th>
<th>Phone</th>
<th>License</th>
<th>Edit</th>
<th>Delete</th>
</tr>
`

data.forEach(d=>{

table.innerHTML+=`
<tr>

<td>${d.name}</td>
<td>${d.phone}</td>
<td>${d.license_number || ""}</td>

<td>
<button onclick="editDriver(${d.id},
'${d.name}',
'${d.phone}',
'${d.license_number || ""}'
)">Edit</button>
</td>

<td>
<button onclick="deleteDriver(${d.id})">Delete</button>
</td>

</tr>
`

})

})

}



function editDriver(id,name,phone,license){

document.getElementById("driver_name").value=name
document.getElementById("driver_phone").value=phone
document.getElementById("license_number").value=license

currentDriver=id

}



function updateDriver(){

if(!currentDriver){
alert("Select driver to update")
return
}

let name=document.getElementById("driver_name").value
let phone=document.getElementById("driver_phone").value
let license=document.getElementById("license_number").value

fetch(API+"/update_driver/"+currentDriver+
"?name="+name+
"&phone="+phone+
"&license_number="+license,{
method:"PUT"
})

.then(()=>{

alert("Driver Updated")

document.getElementById("driver_name").value=""
document.getElementById("driver_phone").value=""
document.getElementById("license_number").value=""

currentDriver=null

loadDrivers()

})

}



function deleteDriver(id){

if(!confirm("Delete this driver?")) return

fetch(API + "/delete_driver/"+id,{
method:"DELETE"
})
.then(()=>{

loadDrivers()

})

}



function logout(){

localStorage.removeItem("loggedIn")

window.location.href = "login.html"

}


loadDrivers()

</script>

</body>
</html>
