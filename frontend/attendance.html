<!DOCTYPE html>
<html>
<head>
    <title>Driver Attendance</title>
    <link rel="stylesheet" href="style.css">
    <script>
        if(localStorage.getItem("loggedIn") !== "true"){
            window.location.href="login.html"
        }
    </script>
    <style>
        .content{ margin-left:260px; padding:30px; width:calc(100% - 260px); }
        .topbar{ display:flex; align-items:center; gap:20px; margin-bottom:20px; }
        .month-nav{ display:flex; align-items:center; gap:20px; margin-top:10px; }
        .calendar-header{ display:grid; grid-template-columns:repeat(7,1fr); text-align:center; margin-top:20px; font-weight:bold; }
        .calendar{ display:grid; grid-template-columns:repeat(7,1fr); gap:10px; margin-top:10px; }
        .day{ background:#1f2d44; padding:20px; border-radius:8px; text-align:center; cursor:pointer; }
        .present{ background:#22c55e; }
        .halfday{ background:#facc15; color:black; }
        .absent{ background:#ef4444; }
    </style>
</head>

<body>
    <div class="sidebar">
        <h2>Transport</h2>
        <a href="dashboard.html">Dashboard</a>
        <a href="vehicles.html">Vehicles</a>
        <a href="drivers.html">Drivers</a>
        <a href="trips.html">Trips</a>
        <a href="fuel.html">Fuel</a>
        <a href="maintenance.html">Maintenance</a>
        <a href="salary.html">Salary</a>
        <a href="attendance.html">Attendance</a>
        <button onclick="logout()" class="logout-btn">Logout</button>
    </div>

    <div class="content">
        <h1>Driver Attendance</h1>
        <div class="topbar">
            <label>Driver:</label>
            <select id="driver"></select>
            <button onclick="saveAttendance()">Save Attendance</button>
        </div>

        <div class="month-nav">
            <button onclick="prevMonth()">◀</button>
            <h2 id="monthTitle"></h2>
            <button onclick="nextMonth()">▶</button>
        </div>

        <div class="calendar-header">
            <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
        </div>
        <div class="calendar" id="calendar"></div>
    </div>

<script>
const API = "https://transport-system-1-i84e.onrender.com";

let currentDate = new Date();
let attendanceData = [];
let tempAttendance = {};

// --- INITIAL LOAD ---
function loadDrivers() {
    fetch(API + "/get_drivers")
        .then(res => res.json())
        .then(data => {
            let driverSelect = document.getElementById("driver");
            driverSelect.innerHTML = "";
            data.forEach(d => {
                driverSelect.innerHTML += `<option value="${d.name}">${d.name}</option>`;
            });
            // Once drivers are loaded, get the attendance records
            loadAttendance();
        });
}

// --- CALENDAR LOGIC ---
function updateMonth() {
    let month = currentDate.getMonth();
    let year = currentDate.getFullYear();
    let names = ["January","February","March","April","May","June","July","August","September","October","November","December"];
    document.getElementById("monthTitle").innerText = names[month] + " " + year;
    generateCalendar();
}

function generateCalendar() {
    let calendar = document.getElementById("calendar");
    calendar.innerHTML = "";
    let year = currentDate.getFullYear();
    let month = currentDate.getMonth();
    let firstDay = new Date(year, month, 1).getDay();
    let daysInMonth = new Date(year, month + 1, 0).getDate();

    // Fill empty slots for previous month days
    for (let i = 0; i < firstDay; i++) { 
        calendar.innerHTML += "<div></div>"; 
    }

    // Generate actual days
    for (let i = 1; i <= daysInMonth; i++) {
        let div = document.createElement("div");
        div.className = "day";
        div.innerText = i;
        div.dataset.state = "";
        div.onclick = () => toggleAttendance(i, div);
        calendar.appendChild(div);
    }
    highlightDays();
}

function toggleAttendance(day, div) {
    let driver = document.getElementById("driver").value;
    let year = currentDate.getFullYear();
    let month = currentDate.getMonth() + 1;
    // Format date as YYYY-MM-DD for consistency
    let date = `${year}-${String(month).padStart(2, "0")}-${String(day).padStart(2, "0")}`;

    div.classList.remove("present", "halfday", "absent");
    let status = "";

    if (div.dataset.state === "") {
        div.dataset.state = "Present"; div.classList.add("present"); status = "Present";
    } else if (div.dataset.state === "Present") {
        div.dataset.state = "Half"; div.classList.add("halfday"); status = "Half";
    } else if (div.dataset.state === "Half") {
        div.dataset.state = "Absent"; div.classList.add("absent"); status = "Absent";
    } else {
        div.dataset.state = ""; status = "Clear";
    }

    // Store change locally until "Save" is clicked
    tempAttendance[date] = { driver_name: driver, status: status };
}

// --- DATABASE SYNC ---
function saveAttendance() {
    let requests = [];
    for (let date in tempAttendance) {
        let a = tempAttendance[date];
        requests.push(
            fetch(`${API}/add_attendance?driver_name=${a.driver_name}&date=${date}&status=${a.status}`, { 
                method: "POST" 
            })
        );
    }
    
    if (requests.length === 0) {
        alert("No changes to save.");
        return;
    }

    Promise.all(requests).then(() => {
        alert("Attendance Saved");
        tempAttendance = {}; // Clear local cache
        // Delay reload slightly so Render DB has time to update
        setTimeout(loadAttendance, 600); 
    });
}

function loadAttendance() {
    fetch(API + "/get_attendance")
        .then(res => res.json())
        .then(data => {
            attendanceData = data;
            updateMonth();
        });
}

function highlightDays() {
    let driver = document.getElementById("driver").value;
    let days = document.querySelectorAll(".day");
    let year = currentDate.getFullYear();
    let month = currentDate.getMonth() + 1;

    days.forEach(d => {
        let dayNum = d.innerText;
        if (!dayNum) return;
        
        let dateKey = `${year}-${String(month).padStart(2, "0")}-${String(dayNum).padStart(2, "0")}`;
        d.classList.remove("present", "halfday", "absent");
        d.dataset.state = "";

        // Check local changes first, if none, check database
        let status = tempAttendance[dateKey] ? tempAttendance[dateKey].status : null;
        
        if (!status) {
            let record = attendanceData.find(a => {
                // Handle ISO strings from DB
                let dbDate = a.date.includes("T") ? a.date.split("T")[0] : a.date;
                return a.driver_name === driver && dbDate === dateKey;
            });
            if (record) status = record.status;
        }

        // Apply visual status and update data-state for next click
        if (status === "Present") { d.classList.add("present"); d.dataset.state = "Present"; }
        else if (status === "Half") { d.classList.add("halfday"); d.dataset.state = "Half"; }
        else if (status === "Absent") { d.classList.add("absent"); d.dataset.state = "Absent"; }
    });
}

// --- NAVIGATION ---
function prevMonth() { currentDate.setMonth(currentDate.getMonth() - 1); updateMonth(); }
function nextMonth() { currentDate.setMonth(currentDate.getMonth() + 1); updateMonth(); }
function logout() { localStorage.removeItem("loggedIn"); window.location.href = "login.html"; }

// Re-highlight when driver changes
document.getElementById("driver").addEventListener("change", highlightDays);

// Start the app
loadDrivers();

</script>
</body>
</html>
