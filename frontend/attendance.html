<!DOCTYPE html>
<html>

<head>


<title>Driver Attendance</title>

<link rel="stylesheet" href="style.css">

<script>
if(localStorage.getItem("loggedIn") !== "true"){
window.location.href = "login.html"
}
</script>

<style>

.content{
margin-left:260px;
padding:30px;
width:calc(100% - 260px);
}

.topbar{
display:flex;
align-items:center;
gap:20px;
margin-bottom:20px;
}

.month-nav{
display:flex;
align-items:center;
gap:20px;
margin-top:10px;
}

.calendar-header{
display:grid;
grid-template-columns:repeat(7,1fr);
text-align:center;
margin-top:20px;
font-weight:bold;
}

.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:10px;
margin-top:10px;
}

.day{
background:#1f2d44;
padding:20px;
border-radius:8px;
text-align:center;
cursor:pointer;
}

.present{
background:#22c55e;
}

.halfday{
background:#facc15;
color:black;
}

.absent{
background:#ef4444;
}

button{
padding:8px 15px;
background:#3b82f6;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

</style>

</head>


<body>

<div class="sidebar">

<h2>Transport</h2>



<a href="dashboard.html">Dashboard</a>
<a href="vehicles.html">Vehicles</a>
<a href="drivers.html">Drivers</a>
<a href="trips.html">Trips</a>
<a href="fuel.html">Fuel</a>
<a href="maintenance.html">Maintenance</a>
<a href="salary.html">Salary</a>
<a href="attendance.html">Attendance</a>
<button onclick="logout()" class ="logout-btn">Logout</button>

</div>



<div class="content">

<h1>Driver Attendance</h1>

<div class="topbar">

<label>Driver:</label>
<select id="driver"></select>

</div>


<div class="month-nav">

<button onclick="prevMonth()">◀</button>

<h2 id="monthTitle"></h2>

<button onclick="nextMonth()">▶</button>

</div>


<div class="calendar-header">
<div>Sun</div>
<div>Mon</div>
<div>Tue</div>
<div>Wed</div>
<div>Thu</div>
<div>Fri</div>
<div>Sat</div>
</div>


<div class="calendar" id="calendar"></div>


</div>



<script>

let currentDate=new Date()
let attendanceData=[]


function loadDrivers(){

fetch("http://transport-system-seven.vercel.app/api/get_drivers")

.then(res=>res.json())

.then(data=>{

let driver=document.getElementById("driver")

driver.innerHTML=""

data.forEach(d=>{

driver.innerHTML+=`<option value="${d.name}">${d.name}</option>`

})

loadAttendance()

})

}



function updateMonth(){

let month=currentDate.getMonth()

let year=currentDate.getFullYear()

let monthNames=[
"January","February","March","April","May","June",
"July","August","September","October","November","December"
]

document.getElementById("monthTitle").innerText=
monthNames[month]+" "+year

generateCalendar()

}



function generateCalendar(){

let calendar=document.getElementById("calendar")

calendar.innerHTML=""

let year=currentDate.getFullYear()

let month=currentDate.getMonth()

let firstDay=new Date(year,month,1).getDay()

let daysInMonth=new Date(year,month+1,0).getDate()


for(let i=0;i<firstDay;i++){

let empty=document.createElement("div")

calendar.appendChild(empty)

}


for(let i=1;i<=daysInMonth;i++){

let div=document.createElement("div")

div.className="day"

div.innerText=i

div.onclick=()=>toggleAttendance(i,div)

calendar.appendChild(div)

}


highlightDays()

}



function toggleAttendance(day,div){

let driver=document.getElementById("driver").value

let year=currentDate.getFullYear()
let month=currentDate.getMonth()+1

let m=String(month).padStart(2,"0")
let d=String(day).padStart(2,"0")

let date=year+"-"+m+"-"+d

let status=""

if(!div.classList.contains("present") && !div.classList.contains("halfday") && !div.classList.contains("absent")){

div.classList.add("present")
status="Present"

}

else if(div.classList.contains("present")){

div.classList.remove("present")
div.classList.add("halfday")
status="Half"

}

else if(div.classList.contains("halfday")){

div.classList.remove("halfday")
div.classList.add("absent")
status="Absent"

}

else{

div.classList.remove("absent")
status="Clear"

}


fetch(`https://transport-system-seven.vercel.app/api/add_attendance?driver_name=${driver}&date=${date}&status=${status}`,{
method:"POST"
})

}



function loadAttendance(){

fetch("https://transport-system-seven.vercel.app/api/get_attendance")

.then(res=>res.json())

.then(data=>{

attendanceData=data

highlightDays()

})

}



function highlightDays(){

let driver=document.getElementById("driver").value

let days=document.querySelectorAll(".day")

let year=currentDate.getFullYear()

let month=currentDate.getMonth()+1

let m=String(month).padStart(2,"0")


days.forEach(d=>{

let day=d.innerText

let dd=String(day).padStart(2,"0")

let date=year+"-"+m+"-"+dd

d.classList.remove("present","halfday","absent")

attendanceData.forEach(a=>{

if(a.driver_name==driver && a.date.includes(date)){

if(a.status=="Present"){
d.classList.add("present")
}

else if(a.status=="Half"){
d.classList.add("halfday")
}

else if(a.status=="Absent"){
d.classList.add("absent")
}

}

})

})

}



function prevMonth(){

currentDate.setMonth(currentDate.getMonth()-1)

updateMonth()

}



function nextMonth(){

currentDate.setMonth(currentDate.getMonth()+1)

updateMonth()

}



document.getElementById("driver").addEventListener("change",highlightDays)


loadDrivers()

updateMonth()


function logout(){

localStorage.removeItem("loggedIn")

window.location.href = "login.html"

}


</script>

</body>
</html>
