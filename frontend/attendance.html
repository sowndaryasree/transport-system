<!DOCTYPE html>
<html>

<head>

<title>Driver Attendance</title>
<link rel="stylesheet" href="style.css">

<script>
if(localStorage.getItem("loggedIn") !== "true"){
window.location.href="login.html"
}
</script>

<style>

.content{
margin-left:260px;
padding:30px;
width:calc(100% - 260px);
}

.topbar{
display:flex;
align-items:center;
gap:20px;
margin-bottom:20px;
}

.month-nav{
display:flex;
align-items:center;
gap:20px;
margin-top:10px;
}

.calendar-header{
display:grid;
grid-template-columns:repeat(7,1fr);
text-align:center;
margin-top:20px;
font-weight:bold;
}

.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:10px;
margin-top:10px;
}

.day{
background:#1f2d44;
padding:20px;
border-radius:8px;
text-align:center;
cursor:pointer;
}

.present{background:#22c55e;}
.halfday{background:#facc15;color:black;}
.absent{background:#ef4444;}

.legend{
margin-top:20px;
display:flex;
gap:20px;
}

.legend span{
padding:6px 12px;
border-radius:6px;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>Transport</h2>

<a href="dashboard.html">Dashboard</a>
<a href="vehicles.html">Vehicles</a>
<a href="drivers.html">Drivers</a>
<a href="trips.html">Trips</a>
<a href="fuel.html">Fuel</a>
<a href="maintenance.html">Maintenance</a>
<a href="salary.html">Salary</a>
<a href="attendance.html">Attendance</a>

<button onclick="logout()" class="logout-btn">Logout</button>

</div>


<div class="content">

<h1>Driver Attendance</h1>

<div class="topbar">

<label>Driver:</label>
<select id="driver"></select>

<button onclick="saveAttendance()">Save Attendance</button>

</div>

<div class="month-nav">

<button onclick="prevMonth()">◀</button>

<h2 id="monthTitle"></h2>

<button onclick="nextMonth()">▶</button>

</div>

<div class="calendar-header">
<div>Sun</div>
<div>Mon</div>
<div>Tue</div>
<div>Wed</div>
<div>Thu</div>
<div>Fri</div>
<div>Sat</div>
</div>

<div class="calendar" id="calendar"></div>

<div class="legend">
<span style="background:#22c55e;">Present</span>
<span style="background:#facc15;color:black;">Half Day</span>
<span style="background:#ef4444;">Absent</span>
</div>

</div>


<script>

const API="https://transport-system-1-i84e.onrender.com"

let currentDate=new Date()
let attendanceData=[]
let tempAttendance={}

/* LOAD DRIVERS */

function loadDrivers(){

fetch(API+"/get_drivers")
.then(res=>res.json())
.then(data=>{

let driver=document.getElementById("driver")
driver.innerHTML=""

data.forEach(d=>{
driver.innerHTML+=`<option value="${d.name}">${d.name}</option>`
})

loadAttendance()

})

}

/* UPDATE MONTH TITLE */

function updateMonth(){

let month=currentDate.getMonth()
let year=currentDate.getFullYear()

let names=[
"January","February","March","April","May","June",
"July","August","September","October","November","December"
]

document.getElementById("monthTitle").innerText=names[month]+" "+year

generateCalendar()

}

/* GENERATE CALENDAR */

function generateCalendar(){

let calendar=document.getElementById("calendar")
calendar.innerHTML=""

let year=currentDate.getFullYear()
let month=currentDate.getMonth()

let firstDay=new Date(year,month,1).getDay()
let daysInMonth=new Date(year,month+1,0).getDate()

for(let i=0;i<firstDay;i++){
calendar.innerHTML+="<div></div>"
}

for(let i=1;i<=daysInMonth;i++){

let div=document.createElement("div")
div.className="day"
div.innerText=i
div.dataset.state=""

div.onclick=()=>toggleAttendance(i,div)

calendar.appendChild(div)

}

highlightDays()

}

/* TOGGLE ATTENDANCE */

function toggleAttendance(day,div){

let driver=document.getElementById("driver").value

let year=currentDate.getFullYear()
let month=currentDate.getMonth()+1

let date=`${year}-${String(month).padStart(2,"0")}-${String(day).padStart(2,"0")}`

div.classList.remove("present","halfday","absent")

let status=""

if(div.dataset.state===""){

div.dataset.state="Present"
div.classList.add("present")
status="Present"

}
else if(div.dataset.state==="Present"){

div.dataset.state="Half"
div.classList.add("halfday")
status="Half"

}
else if(div.dataset.state==="Half"){

div.dataset.state="Absent"
div.classList.add("absent")
status="Absent"

}
else{

div.dataset.state=""
div.classList.remove("present","halfday","absent")

tempAttendance[date]={
driver_name:driver,
status:"Present"
}

div.dataset.state="Present"
div.classList.add("present")

}
tempAttendance[date]={
driver_name:driver,
status:status
}

}

/* SAVE ATTENDANCE */

function saveAttendance(){

let requests=[]

for(let date in tempAttendance){

let a=tempAttendance[date]

requests.push(
fetch(`${API}/add_attendance?driver_name=${a.driver_name}&date=${date}&status=${a.status}`,{
method:"POST"
})
)

}

if(requests.length===0){
alert("No changes")
return
}

Promise.all(requests)
.then(()=>{

alert("Attendance Saved")

tempAttendance={}

setTimeout(loadAttendance,1500)

})

}

/* LOAD ATTENDANCE */

function loadAttendance(){

fetch(API+"/get_attendance")
.then(res=>res.json())
.then(data=>{

attendanceData=data

updateMonth()

})

}

/* HIGHLIGHT DAYS */

function highlightDays(){

let driver=document.getElementById("driver").value

let days=document.querySelectorAll(".day")

let year=currentDate.getFullYear()
let month=currentDate.getMonth()+1

days.forEach(d=>{

let day=d.innerText
if(!day) return

let date=`${year}-${String(month).padStart(2,"0")}-${String(day).padStart(2,"0")}`

d.classList.remove("present","halfday","absent")
d.dataset.state=""

let status=null

attendanceData.forEach(a=>{

let dbDate=a.date.includes("T")?a.date.split("T")[0]:a.date

if(a.driver_name===driver && dbDate===date){
status=a.status
}

})

if(tempAttendance[date]){
status=tempAttendance[date].status
}

if(status==="Present"){
d.classList.add("present")
d.dataset.state="Present"
}

if(status==="Half"){
d.classList.add("halfday")
d.dataset.state="Half"
}

if(status==="Absent"){
d.classList.add("absent")
d.dataset.state="Absent"
}

})

}

/* MONTH NAVIGATION */

function prevMonth(){
currentDate.setMonth(currentDate.getMonth()-1)
updateMonth()
}

function nextMonth(){
currentDate.setMonth(currentDate.getMonth()+1)
updateMonth()
}

/* DRIVER CHANGE */

document.getElementById("driver").addEventListener("change",highlightDays)

/* LOGOUT */

function logout(){
localStorage.removeItem("loggedIn")
window.location.href="login.html"
}

/* START */

loadDrivers()

</script>

</body>
</html>
