<!DOCTYPE html>
<html>

<head>

<title>Salary</title>

<link rel="stylesheet" href="style.css">

<script>
if(localStorage.getItem("loggedIn") !== "true"){
window.location.href = "login.html"
}
</script>

</head>

<body>

<div class="sidebar">

<h2>Transport</h2>

<a href="dashboard.html">Dashboard</a>
<a href="vehicles.html">Vehicles</a>
<a href="drivers.html">Drivers</a>
<a href="trips.html">Trips</a>
<a href="fuel.html">Fuel</a>
<a href="maintenance.html">Maintenance</a>
<a href="salary.html">Salary</a>
<a href="attendance.html">Attendance</a>

<button onclick="logout()" class="logout-btn">Logout</button>

</div>


<div class="main">

<h1>Add Salary</h1>

<select id="salary_driver"></select>

<br><br>

<input id="salary_amount" placeholder="Amount">

<br><br>

<input id="salary_notes" placeholder="Notes (optional)">

<br><br>

<input type="date" id="salary_date">

<br><br>

<button onclick="addSalary()">Add Salary</button>
<button onclick="updateSalary()">Update Salary</button>

<hr>

<h2>Salary Records</h2>

<table id="salary_table" border="1">

<tr>
<th>Driver</th>
<th>Amount</th>
<th>Notes</th>
<th>Date</th>
<th>Edit</th>
<th>Delete</th>
</tr>

</table>

</div>


<script>

const API = "https://transport-system-1-i84e.onrender.com"

let currentSalary = null



function loadDrivers(){

fetch(API + "/get_drivers")
.then(r=>r.json())
.then(data=>{

let select = document.getElementById("salary_driver")

select.innerHTML = "<option value=''>Select Driver</option>"

data.forEach(d=>{

select.innerHTML += `
<option value="${d.name}">
${d.name}
</option>
`

})

})

}



function addSalary(){

let driver = document.getElementById("salary_driver").value
let amount = document.getElementById("salary_amount").value
let notes = document.getElementById("salary_notes").value
let date = document.getElementById("salary_date").value

if(driver=="" || amount==""){
alert("Please fill driver and amount")
return
}

fetch(API + "/add_salary?driver_name="+driver+
"&amount="+amount+
"&notes="+notes+
"&salary_date="+date,{
method:"POST"
})
.then(()=>{

alert("Salary Added")

document.getElementById("salary_amount").value=""
document.getElementById("salary_notes").value=""

loadSalary()

})

}



function loadSalary(){

fetch(API + "/get_salary")
.then(r=>r.json())
.then(data=>{

let table = document.getElementById("salary_table")

table.innerHTML = `
<tr>
<th>Driver</th>
<th>Amount</th>
<th>Notes</th>
<th>Date</th>
<th>Edit</th>
<th>Delete</th>
</tr>
`

data.forEach(s=>{

table.innerHTML += `
<tr>

<td>${s.driver_name}</td>
<td>${s.amount}</td>
<td>${s.notes || "-"}</td>
<td>${s.salary_date || "-"}</td>

<td>
<button onclick="editSalary(${s.id},
'${s.driver_name}',
'${s.amount}',
'${s.notes || ""}',
'${s.salary_date || ""}'
)">Edit</button>
</td>

<td>
<button onclick="deleteSalary(${s.id})">Delete</button>
</td>

</tr>
`

})

})

}



function editSalary(id,driver,amount,notes,date){

document.getElementById("salary_driver").value = driver
document.getElementById("salary_amount").value = amount
document.getElementById("salary_notes").value = notes
document.getElementById("salary_date").value = date

currentSalary = id

}



function updateSalary(){

if(!currentSalary){
alert("Select record to update")
return
}

let driver = document.getElementById("salary_driver").value
let amount = document.getElementById("salary_amount").value
let notes = document.getElementById("salary_notes").value
let date = document.getElementById("salary_date").value

fetch(API+"/update_salary/"+currentSalary+
"?driver_name="+driver+
"&amount="+amount+
"&notes="+notes+
"&salary_date="+date,{
method:"PUT"
})

.then(()=>{

alert("Salary Updated")

currentSalary = null

loadSalary()

})

}



function deleteSalary(id){

if(!confirm("Delete this salary record?")) return

fetch(API + "/delete_salary/"+id,{
method:"DELETE"
})
.then(()=>{

loadSalary()

})

}



function logout(){

localStorage.removeItem("loggedIn")

window.location.href = "login.html"

}


loadDrivers()
loadSalary()

</script>

</body>
</html>
