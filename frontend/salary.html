<!DOCTYPE html>
<html>

<head>
<title>Salary</title>
<link rel="stylesheet" href="/frontend/style.css">

<script>
if(localStorage.getItem("loggedIn") !== "true"){
window.location.href = "/frontend/login.html"
}
</script>

</head>

<body>

<div class="sidebar">

<h2>Transport</h2>

<a href="/frontend/dashboard.html">Dashboard</a>
<a href="/frontend/vehicles.html">Vehicles</a>
<a href="/frontend/drivers.html">Drivers</a>
<a href="/frontend/trips.html">Trips</a>
<a href="/frontend/fuel.html">Fuel</a>
<a href="/frontend/maintenance.html">Maintenance</a>
<a href="/frontend/salary.html">Salary</a>
<a href="/frontend/attendance.html">Attendance</a>
<button onclick="logout()" class ="logout-btn">Logout</button>

</div>


<div class="main">

<h1>Add Salary</h1>

<select id="salary_driver"></select>

<br><br>

<input id="salary_amount" placeholder="Amount">

<br><br>

<input id="salary_notes" placeholder="Notes (optional)">

<br><br>
<input type="date" id="salary_date">
<button onclick="addSalary()">Add Salary</button>

<hr>

<h2>Salary Records</h2>

<table id="salary_table" border="1">

<tr>
<th>Driver</th>
<th>Amount</th>
<th>Notes</th>
<th>Delete</th>
</tr>

</table>


<br><br>
<button onclick="downloadSalary()">Download Excel</button>

<br><br>
</div>


<script>

const API = "https://transport-system-1-i84e.onrender.com"



function loadDrivers(){

fetch(API + "/get_drivers")
.then(r=>r.json())
.then(data=>{

let select = document.getElementById("salary_driver")

select.innerHTML = "<option>Select Driver</option>"

data.forEach(d=>{

select.innerHTML += `
<option>${d.name}</option>
`

})

})

}



function addSalary(){

let driver = document.getElementById("salary_driver").value
let amount = document.getElementById("salary_amount").value
let notes = document.getElementById("salary_notes").value

fetch(API + "/add_salary?driver_name="+driver+
"&amount="+amount+
"&notes="+notes,{
method:"POST"
})
.then(()=>{

alert("Salary Added")

loadSalary()

})

}



function loadSalary(){

fetch(API + "/get_salary")
.then(r=>r.json())
.then(data=>{

let table = document.getElementById("salary_table")

table.innerHTML = `
<tr>
<th>Driver</th>
<th>Amount</th>
<th>Notes</th>
<th>Delete</th>
</tr>
`

data.forEach(s=>{

table.innerHTML += `
<tr>
<td>${s.driver_name}</td>
<td>${s.amount}</td>
<td>${s.notes}</td>
<td>
<button onclick="deleteSalary(${s.id})">Delete</button>
</td>
</tr>
`

})

})

}



function deleteSalary(id){

fetch(API + "/delete_salary/"+id,{
method:"DELETE"
})
.then(()=>{

loadSalary()

})

}



loadDrivers()
loadSalary()


function logout(){

localStorage.removeItem("loggedIn")

window.location.href = "/frontend/login.html"

}

</script>

</body>
</html>
