<!DOCTYPE html>
<html>

<head>

<title>Transport Manager Login</title>

<link rel="stylesheet" href="style.css">

</head>

<body class="login-body">

<div class="login-box">

<h2>Transport Manager</h2>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>


<script>

const USERNAME = "harish"
const PASSWORD = "12345"

function login(){

let user = document.getElementById("username").value.trim()
let pass = document.getElementById("password").value.trim()

if(user === "" || pass === ""){
alert("Please enter username and password")
return
}

if(user === USERNAME && pass === PASSWORD){

localStorage.setItem("loggedIn","true")

window.location.href="index.html"

}
else{

alert("Invalid Login")

}

}


// ENTER KEY LOGIN
document.getElementById("username").addEventListener("keydown",enterLogin)
document.getElementById("password").addEventListener("keydown",enterLogin)

function enterLogin(e){

if(e.key === "Enter"){
login()
}

}

</script>

</body>
</html>
